name: Lint

on:
  push:
    branches: [main, marketia-v2]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format (check-only)
        run: ruff format --check .

      - name: Import smoke test
        # Pure imports — never calls the deep-research model. Safe to run on every PR.
        run: |
          python -c "import marketia.core, marketia.reports, marketia.ui.app"
          python -c "import cli.research, cli.followup"
